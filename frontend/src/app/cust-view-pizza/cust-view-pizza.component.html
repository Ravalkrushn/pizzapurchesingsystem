<div class="container mt-4">
    <!-- Restaurant Header -->
    <div class="row mb-4" *ngIf="selectedRes">
        <div class="col-md-12 text-center p-4 bg-light rounded-4 shadow-sm position-relative">
            <h2 class="display-5 fw-bold text-primary">{{selectedRes.res_name}}</h2>
            <p class="text-muted"><i class="bi bi-geo-alt-fill"></i> {{selectedRes.address}}, {{selectedRes.city}}</p>
            <hr class="w-25 mx-auto">
            <button class="btn btn-warning position-absolute top-0 end-0 m-4 rounded-pill fw-bold shadow-sm" routerLink="/cust_cart">
                <i class="bi bi-cart-check-fill"></i> View Cart
            </button>
        </div>
    </div>

    <!-- Filters Section -->
    <div class="row mb-5 sticky-top bg-white py-3 shadow-sm rounded-4 z-3" style="top: 10px;">
        <div class="col-md-4">
            <label class="small fw-bold text-muted">Filter by Name</label>
            <input type="text" class="form-control rounded-pill border-2" placeholder="Search pizza..." [(ngModel)]="searchName" (input)="applyFilters()">
        </div>
        <div class="col-md-3">
            <label class="small fw-bold text-muted">Category</label>
            <select class="form-select rounded-pill border-2" [(ngModel)]="selectedCatId" (change)="applyFilters()">
                <option value="">All Categories</option>
                <option *ngFor="let cat of categories" [value]="cat.cat_id">{{cat.cat_name}}</option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="small fw-bold text-muted">Pizza Type</label>
            <select class="form-select rounded-pill border-2" [(ngModel)]="selectedType" (change)="applyFilters()">
                <option value="">All Types</option>
                <option value="Veg">Veg Only</option>
                <option value="Non-Veg">Non-Veg Only</option>
            </select>
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-outline-danger rounded-pill w-100" (click)="searchName=''; selectedCatId=''; selectedType=''; applyFilters()">Reset</button>
        </div>
    </div>

    <!-- Pizza Grid -->
    <div class="row">
        <div class="col-md-4 mb-4" *ngFor="let p of filteredPizzas">
            <div class="card h-100 pizza-card border-0 shadow-sm overflow-hidden">
                <div class="position-relative">
                    <img [src]="'http://localhost:3000/pizza_img/' + p.pizza_img" 
                         class="card-img-top pizza-img" 
                         onerror="this.src='https://images.unsplash.com/photo-1574071318508-1cdbad80ad38?q=80&w=500&auto=format&fit=crop'">
                    <span class="badge position-absolute top-0 end-0 m-3 p-2 px-3 rounded-pill" 
                          [ngClass]="p.pizza_type == 'Veg' ? 'bg-success' : 'bg-danger'">
                        {{p.pizza_type}}
                    </span>
                </div>
                
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold">{{p.pizza_name}}</h5>
                    <p class="card-text text-muted small flex-grow-1">{{p.description}}</p>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="h4 fw-bold text-success mb-0">₹{{p.price}}</span>
                        
                        <!-- Quantity Counter -->
                        <div class="input-group input-group-sm rounded-pill border overflow-hidden" style="width: 100px;">
                            <button class="btn btn-light border-0" (click)="p.qty > 1 ? p.qty = p.qty - 1 : p.qty = 1">-</button>
                            <input type="text" class="form-control border-0 text-center bg-transparent fw-bold" [(ngModel)]="p.qty" readonly>
                            <button class="btn btn-light border-0" (click)="p.qty = p.qty + 1">+</button>
                        </div>
                    </div>
                    
                    <button class="btn btn-primary mt-3 w-100 rounded-pill fw-bold py-2 shadow-sm" (click)="addToCart(p)">
                        <i class="bi bi-cart-plus-fill me-2"></i> Add to Cart
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Empty State -->
        <div class="col-12 text-center py-5" *ngIf="filteredPizzas.length == 0">
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/empty-cart-2130356-1800917.png" style="width: 200px;">
            <h4 class="text-muted mt-3">No pizzas found here. Try another filter!</h4>
        </div>
    </div>
</div>
